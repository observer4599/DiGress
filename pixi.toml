[workspace]
name = "digress"
version = "1.0.1"
description = "Discrete denoising diffusion for graph generation"
channels = ["conda-forge", "pytorch"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = "3.11.*"
graph-tool = "==2.46"
pytorch = { version = "==2.5.1", channel = "pytorch" }
torchvision = { version = "==0.20.1", channel = "pytorch" }

[pypi-dependencies]
numpy = "==1.26.4"
scipy = "==1.17.1"
matplotlib = "==3.10.8"
networkx = "==3.6.1"
pandas = "==1.5.3"
tqdm = "==4.67.3"
rdkit = "==2025.9.6"
hydra-core = "==1.3.2"
imageio = "==2.37.3"
omegaconf = "==2.3.0"
overrides = "==7.7.0"
pyemd = "==1.1.0"
PyGSP = "==0.6.1"
pytorch-lightning = "==2.0.4"
torch_geometric = "==2.7.0"
torchmetrics = "==1.9.0"
tensorboard = "==2.20.0"
pytest = "==8.3.5"
loguru = "==0.7.3"
moviepy = "==1.0.3"
setuptools = "==81.0.0"
digress = { path = ".", editable = true }

[environments]
default = { solve-group = "default" }

[tasks]
train = "python src/main.py"
