[workspace]
name = "digress"
version = "1.0.1"
description = "Discrete denoising diffusion for graph generation"
channels = ["conda-forge", "pytorch"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = "3.11.*"
pytorch = { version = ">=2.1", channel = "pytorch" }
torchvision = { version = ">=0.16", channel = "pytorch" }
numpy = ">=1.23,<2"
scipy = ">=1.11"
matplotlib = ">=3.7"
networkx = ">=2.8"
pandas = ">=1.4,<2"
tqdm = ">=4.65"
setuptools = ">=68,<80"
rdkit = "2023.03.2"
graph-tool = ">=2.45"

[pypi-dependencies]
setuptools = ">=68,<80"
hydra-core = ">=1.3.2"
imageio = ">=2.31"
omegaconf = ">=2.3"
overrides = ">=7.3"
pyemd = ">=1.0"
PyGSP = ">=0.5"
pytorch-lightning = "==2.0.4"
torch_geometric = ">=2.3"
torchmetrics = ">=0.11"
wandb = ">=0.15"
digress = { path = ".", editable = true }

[environments]
default = { solve-group = "default" }

[tasks]
train = "python src/main.py"
